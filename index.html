<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morbai karaoke</title>
    <style>
        .checkbox-group { display: flex; gap: 20px; margin-top: 15px; padding: 10px; background: #2c2c2c; border-radius: 6px; }
        .checkbox-group label { margin: 0; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
    </style>
  <link rel="stylesheet" crossorigin href="/karaoke-spinwheel/assets/index-C6H40iPo.css">
</head>
<body>

    <button id="loginToggleBtn" class="corner-btn" onclick="openLoginModal()"> Morbai Only</button>

    <header>
        <h1 class="main-title"> ขอเพลงคาราโอเกะ 🎤 </h1>
        <button id="requestBtn" class="btn-primary main-request-btn" onclick="openRequestModal()">ขอเพลงเลย</button>
    </header>

    <main class="wheels-container">
        <section class="wheel-section main-wheel-box">
            <h2> กงล้อเพลง </h2>
            <div class="canvas-container">
                <div class="pointer">▼</div>
                <canvas id="mainWheelCanvas" width="300" height="300"></canvas>
            </div>
            <button class="btn-spin singer-only" onclick="spinMainWheel()">หมุนกงล้อ</button>
            <div id="mainResult" class="result-text">รอการหมุน...</div>
        </section>

        <section class="slots-container">
            <div class="slot-box">
                <h2>ต้องร้องแบบไหน</h2>
                <div class="slot-window">
                    <div id="slotStripA" class="slot-strip"></div>
                </div>
                <button class="btn-spin slot-btn singer-only" onclick="spinSlot('A')">หมุนเลย</button>
                <div id="resultA" class="result-text"></div>
            </div>

            <div class="slot-box">
                <h2>ต้องทำอะไรตอนร้อง</h2>
                <div class="slot-window">
                    <div id="slotStripB" class="slot-strip"></div>
                </div>
                <button class="btn-spin slot-btn singer-only" onclick="spinSlot('B')">หมุนเลย</button>
                <div id="resultB" class="result-text"></div>
            </div>
        </section>

        <section id="adminDashboard" class="wheel-section singer-only" style="margin-top: 40px; text-align: left;">
            <h2 style="text-align: center; color: var(--error-color);">ระบบจัดการหลังบ้าน</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>เพลง/Link</th>
                        <th>คนขอ</th>
                        <th style="width: 150px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="songListBody"></tbody>
            </table>
        </section>
    </main>

    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('requestModal')">&times;</span>
            <h2>ขอเพลง</h2>
            <form id="songForm" onsubmit="submitSong(event)">
                <div class="form-group">
                    <label>ชื่อเพลง</label>
                    <input type="text" id="songName" placeholder="ชื่อเพลง...">
                </div>
                <div class="form-group">
                    <label>Link เพลง </label>
                    <input type="text" id="songLink" placeholder="www...">
                </div>
                <div class="form-group">
                    <label>ชื่อคนขอ </label>
                    <input type="text" id="friendName" placeholder="นามสมมติ หรือ ชื่อจริงๆ...">
                </div>
                
                <div class="checkbox-group">
                    <label><input type="checkbox" id="wheelA" checked> ให้สุ่ม"ร้องแบบไหน"ไหม</label>
                    <label><input type="checkbox" id="wheelB" checked> ให้สุ่ม"ทำอะไรตอนร้อง"ไหม</label>
                </div>

                <button type="submit" class="btn-primary w-100" style="margin-top: 20px;">ยืนยัน</button>
            </form>
        </div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content" style="text-align: center; border: 2px solid var(--primary-color);">
            <h2 style="font-size: 2rem; margin-top: 0;">🎉 ได้เพลงแล้ว! 🎉</h2>
            <div id="resultDetails" style="margin: 20px 0; font-size: 1.2rem; text-align: left; background: #2c2c2c; padding: 20px; border-radius: 8px; line-height: 1.8;">
                </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn-primary" style="flex: 1; padding: 15px;" onclick="closeModal('resultModal')">เก็บไว้</button>
                <button class="btn-danger" style="flex: 1; padding: 15px;" onclick="deleteResultSong()">เอาออก</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editModal')">&times;</span>
            <h2>✏️ แก้ไขข้อมูล</h2>
            <input type="hidden" id="editSongId">
            <div class="form-group"><label>ชื่อเพลง</label><input type="text" id="editSongName"></div>
            <div class="form-group"><label>Link เพลง</label><input type="text" id="editSongLink"></div>
            <div class="form-group"><label>ชื่อคนขอ</label><input type="text" id="editFriendName"></div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="editWheelA"> รับสุ่มกงล้อร้องแบบไหน</label>
                <label><input type="checkbox" id="editWheelB"> รับสุ่มกงล้อทำอะไรตอนร้อง</label>
            </div>
            <button class="btn-primary w-100" style="margin-top: 20px;" onclick="saveEditSong()">ยืนยัน</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content" style="max-width: 300px;">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>เข้าสู่ระบบ Morbai</h2>
            <input type="password" id="singerPass" placeholder="รหัสผ่าน (1234)" class="w-100" style="margin-bottom: 10px;">
            <button class="btn-primary w-100" onclick="checkLogin()">ยืนยัน</button>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
